<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Window gradient -->
    <linearGradient id="windowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <!-- Window border -->
    <linearGradient id="windowBorderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>

    <!-- Play button gradient -->
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Sphere gradient -->
    <radialGradient id="sphereGrad" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#F5D0FE"/>
      <stop offset="40%" stop-color="#D8B4FE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>

    <!-- Comet trail gradient -->
    <linearGradient id="cometTrail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E9D5FF" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Strong glow -->
    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#C084FC" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ripple filter for play button -->
    <filter id="ripple" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#3B0764" flood-opacity="0.6"/>
    </filter>

    <!-- Particle glow -->
    <filter id="particleGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <style>
    /* Orbit rotation */
    @keyframes orbitRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Window entrance + float */
    @keyframes windowEntrance {
      0% { transform: scale(0.3) translateY(40px); opacity: 0; }
      60% { transform: scale(1.05) translateY(-2px); opacity: 1; }
      80% { transform: scale(0.98) translateY(1px); }
      100% { transform: scale(1) translateY(0); }
    }
    @keyframes windowFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-5px) rotate(0.5deg); }
      75% { transform: translateY(3px) rotate(-0.3deg); }
    }

    /* Play button pulse with ripple */
    @keyframes playPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes playEntrance {
      0% { transform: scale(0) rotate(-90deg); opacity: 0; }
      70% { transform: scale(1.15) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes rippleExpand {
      0% { r: 38; opacity: 0.6; }
      100% { r: 65; opacity: 0; }
    }

    /* Sparkle animations */
    @keyframes sparkleSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes sparkleScale {
      0%, 100% { transform: scale(0.4); opacity: 0.2; }
      50% { transform: scale(1.3); opacity: 1; }
    }
    @keyframes sparkleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-8px) scale(1.2); opacity: 1; }
    }

    /* Sphere comet */
    @keyframes spherePulse {
      0%, 100% { r: 14; }
      50% { r: 17; }
    }

    /* Motion path draw */
    @keyframes drawPath {
      0% { stroke-dashoffset: 250; opacity: 0.3; }
      30% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }
    @keyframes dashFlow {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }

    /* Dot bounce along path */
    @keyframes dotBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.3); }
    }
    @keyframes dotEntrance {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.4); opacity: 1; }
      100% { transform: scale(1); }
    }

    /* Floating particles */
    @keyframes particleFloat1 {
      0% { transform: translate(0, 0); opacity: 0; }
      20% { opacity: 0.8; }
      100% { transform: translate(-30px, -50px); opacity: 0; }
    }
    @keyframes particleFloat2 {
      0% { transform: translate(0, 0); opacity: 0; }
      20% { opacity: 0.6; }
      100% { transform: translate(25px, -45px); opacity: 0; }
    }
    @keyframes particleFloat3 {
      0% { transform: translate(0, 0); opacity: 0; }
      25% { opacity: 0.7; }
      100% { transform: translate(-20px, -60px); opacity: 0; }
    }

    /* Title bar dots wave */
    @keyframes dotWave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Arrow shoot */
    @keyframes arrowShoot {
      0% { transform: translateX(-10px); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* Classes */
    .orbit-group {
      transform-origin: 256px 256px;
      animation: orbitRotate 10s linear infinite;
    }
    .window-group {
      transform-origin: 250px 255px;
      animation: windowEntrance 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 windowFloat 5s ease-in-out 1.2s infinite;
    }
    .play-btn {
      transform-origin: 365px 335px;
      animation: playEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both,
                 playPulse 2.5s ease-in-out 1.4s infinite;
    }
    .ripple-1 {
      animation: rippleExpand 2.5s ease-out infinite;
    }
    .ripple-2 {
      animation: rippleExpand 2.5s ease-out 0.8s infinite;
    }
    .ripple-3 {
      animation: rippleExpand 2.5s ease-out 1.6s infinite;
    }

    .sparkle-a { transform-origin: 118px 158px; animation: sparkleScale 2.2s ease-in-out infinite; }
    .sparkle-b { transform-origin: 400px 175px; animation: sparkleScale 2.8s ease-in-out 0.6s infinite; }
    .sparkle-c { transform-origin: 410px 365px; animation: sparkleFloat 3s ease-in-out 0.3s infinite; }
    .sparkle-d { transform-origin: 125px 370px; animation: sparkleFloat 2.6s ease-in-out 1s infinite; }
    .sparkle-e { transform-origin: 90px 260px; animation: sparkleScale 3.5s ease-in-out 1.5s infinite; }
    .sparkle-f { transform-origin: 430px 270px; animation: sparkleFloat 2.4s ease-in-out 0.8s infinite; }

    .title-dot-1 { transform-origin: 175px 205px; animation: dotWave 1.5s ease-in-out infinite; }
    .title-dot-2 { transform-origin: 198px 205px; animation: dotWave 1.5s ease-in-out 0.15s infinite; }

    .motion-path { animation: drawPath 2s ease-out 0.8s both, dashFlow 1s linear 2.8s infinite; }

    .path-dot-1 { transform-origin: 185px 278px; animation: dotEntrance 0.5s ease-out 1.5s both, dotBounce 2s ease-in-out 2s infinite; }
    .path-dot-2 { transform-origin: 240px 260px; animation: dotEntrance 0.5s ease-out 1.8s both, dotBounce 2s ease-in-out 2.3s infinite; }
    .path-dot-3 { transform-origin: 290px 255px; animation: dotEntrance 0.5s ease-out 2.1s both, dotBounce 2s ease-in-out 2.6s infinite; }

    .arrow-head { transform-origin: 322px 245px; animation: arrowShoot 0.6s ease-out 2.4s both; }

    .particle-1 { animation: particleFloat1 3s ease-out infinite; }
    .particle-2 { animation: particleFloat2 3.5s ease-out 1s infinite; }
    .particle-3 { animation: particleFloat3 4s ease-out 2s infinite; }
    .particle-4 { animation: particleFloat1 3.2s ease-out 0.5s infinite; }
    .particle-5 { animation: particleFloat2 2.8s ease-out 1.5s infinite; }
  </style>

  <!-- Orbital rings -->
  <g class="orbit-group">
    <!-- Outer ring -->
    <ellipse cx="256" cy="256" rx="220" ry="120"
             fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.35"
             transform="rotate(-25, 256, 256)"/>
    <!-- Inner ring -->
    <ellipse cx="256" cy="256" rx="200" ry="108"
             fill="none" stroke="#C084FC" stroke-width="1.5" opacity="0.2"
             transform="rotate(-25, 256, 256)"/>

    <!-- Orbit arrow -->
    <polygon points="92,332 112,322 102,348" fill="#A855F7" opacity="0.6"
             transform="rotate(-25, 256, 256)"/>

    <!-- Comet trail behind sphere -->
    <path d="M310,105 Q280,108 250,118 Q220,130 200,148"
          fill="none" stroke="url(#cometTrail)" stroke-width="6" stroke-linecap="round"
          transform="rotate(-25, 256, 256)" opacity="0.5"/>

    <!-- Sphere -->
    <g filter="url(#glowStrong)">
      <circle cx="310" cy="108" r="14" fill="url(#sphereGrad)"
              transform="rotate(-25, 256, 256)">
        <animate attributeName="r" values="14;17;14" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Sphere highlight -->
      <circle cx="305" cy="102" r="4" fill="white" opacity="0.7"
              transform="rotate(-25, 256, 256)"/>
    </g>
  </g>

  <!-- Floating particles rising from window -->
  <g opacity="0.7">
    <circle class="particle-1" cx="200" cy="180" r="2.5" fill="#D8B4FE" filter="url(#particleGlow)"/>
    <circle class="particle-2" cx="280" cy="190" r="2" fill="#E9D5FF" filter="url(#particleGlow)"/>
    <circle class="particle-3" cx="240" cy="175" r="3" fill="#C084FC" filter="url(#particleGlow)"/>
    <circle class="particle-4" cx="310" cy="185" r="1.5" fill="#F5D0FE" filter="url(#particleGlow)"/>
    <circle class="particle-5" cx="170" cy="190" r="2" fill="#D8B4FE" filter="url(#particleGlow)"/>
  </g>

  <!-- Main window -->
  <g class="window-group" filter="url(#shadow)">
    <!-- Window body -->
    <rect x="140" y="175" width="225" height="158" rx="18"
          fill="url(#windowGrad)" stroke="url(#windowBorderGrad)" stroke-width="2.5"/>

    <!-- Window shine -->
    <rect x="145" y="180" width="100" height="40" rx="14"
          fill="white" opacity="0.06"/>

    <!-- Title bar dots with wave -->
    <g class="title-dot-1">
      <circle cx="175" cy="205" r="6.5" fill="white" opacity="0.9"/>
    </g>
    <g class="title-dot-2">
      <circle cx="198" cy="205" r="6.5" fill="white" opacity="0.65"/>
    </g>

    <!-- Motion path -->
    <path class="motion-path"
          d="M168,295 C188,255 208,278 235,262 S275,285 300,258 L325,245"
          fill="none" stroke="white" stroke-width="2.5"
          stroke-dasharray="8,6" stroke-linecap="round" opacity="0.85"/>

    <!-- Arrow head -->
    <g class="arrow-head">
      <polygon points="325,245 314,237 316,254" fill="white" opacity="0.9"/>
    </g>

    <!-- Keyframe dots -->
    <g class="path-dot-1">
      <circle cx="185" cy="278" r="8" fill="white"/>
    </g>
    <g class="path-dot-2">
      <circle cx="240" cy="260" r="6" fill="white" opacity="0.8"/>
    </g>
    <g class="path-dot-3">
      <circle cx="290" cy="255" r="5" fill="white" opacity="0.7"/>
    </g>
  </g>

  <!-- Play button with ripples -->
  <g class="play-btn">
    <!-- Ripple rings -->
    <circle class="ripple-1" cx="365" cy="335" r="38" fill="none" stroke="#C084FC" stroke-width="2"/>
    <circle class="ripple-2" cx="365" cy="335" r="38" fill="none" stroke="#C084FC" stroke-width="1.5"/>
    <circle class="ripple-3" cx="365" cy="335" r="38" fill="none" stroke="#C084FC" stroke-width="1"/>

    <!-- Button body -->
    <circle cx="365" cy="335" r="36" fill="url(#playGrad)"
            stroke="#E9D5FF" stroke-width="2.5" filter="url(#glowStrong)"/>

    <!-- Play triangle -->
    <polygon points="354,314 354,356 388,335" fill="white"/>
  </g>

  <!-- Sparkles — four-point stars -->
  <g class="sparkle-a">
    <path d="M118,150 L118,166 M110,158 L126,158" stroke="#E9D5FF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M114,154 L122,162 M122,154 L114,162" stroke="#E9D5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <g class="sparkle-b">
    <path d="M400,168 L400,182 M393,175 L407,175" stroke="#D8B4FE" stroke-width="2" stroke-linecap="round"/>
    <path d="M396,171 L404,179 M404,171 L396,179" stroke="#D8B4FE" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>
  <g class="sparkle-c">
    <path d="M410,358 L410,372 M403,365 L417,365" stroke="#E9D5FF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M406,361 L414,369 M414,361 L406,369" stroke="#E9D5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>
  <g class="sparkle-d">
    <path d="M125,363 L125,377 M118,370 L132,370" stroke="#C084FC" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="sparkle-e">
    <path d="M90,254 L90,266 M84,260 L96,260" stroke="#D8B4FE" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <g class="sparkle-f">
    <path d="M430,264 L430,276 M424,270 L436,270" stroke="#C084FC" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
